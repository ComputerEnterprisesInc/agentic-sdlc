<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Login/Register Screen -->
  <div id="auth-screen" class="screen active">
    <div class="container">
      <div class="auth-box">
        <h1>📋 Task Manager</h1>
        <p class="subtitle">Manage your tasks efficiently</p>
        
        <!-- Login Form -->
        <div id="login-form" class="auth-form active">
          <h2>Login</h2>
          <form id="loginForm">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <p class="switch-auth">
            Don't have an account? <a href="#" id="show-register">Register</a>
          </p>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="auth-form">
          <h2>Register</h2>
          <form id="registerForm">
            <div class="form-group">
              <label for="register-name">Name</label>
              <input type="text" id="register-name" required placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="register-email">Email</label>
              <input type="email" id="register-email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="register-password">Password</label>
              <input type="password" id="register-password" required placeholder="Min 6 characters">
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
          </form>
          <p class="switch-auth">
            Already have an account? <a href="#" id="show-login">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tasks Screen -->
  <div id="tasks-screen" class="screen">
    <nav class="navbar">
      <div class="container">
        <h1>📋 My Tasks</h1>
        <div class="nav-actions">
          <span id="user-name" class="user-name"></span>
          <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- Add Task Form -->
      <div class="add-task-section">
        <h2>Add New Task</h2>
        <form id="addTaskForm">
          <div class="form-row">
            <div class="form-group flex-grow">
              <input type="text" id="task-title" required placeholder="Task title" class="input-large">
            </div>
            <button type="submit" class="btn btn-primary">Add Task</button>
          </div>
          <div class="form-group">
            <textarea id="task-description" placeholder="Description (optional)" rows="2"></textarea>
          </div>
        </form>
      </div>

      <!-- Tasks List -->
      <div class="tasks-section">
        <div class="tasks-header">
          <h2>Your Tasks</h2>
          <div class="tasks-stats">
            <span id="tasks-count">0 tasks</span>
          </div>
        </div>
        <div id="tasks-list" class="tasks-list">
          <!-- Tasks will be loaded here -->
        </div>
        <div id="empty-state" class="empty-state">
          <p>🎉 No tasks yet! Add your first task above.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Task</h2>
        <button class="close-modal">&times;</button>
      </div>
      <form id="editTaskForm">
        <input type="hidden" id="edit-task-id">
        <div class="form-group">
          <label for="edit-task-title">Title</label>
          <input type="text" id="edit-task-title" required>
        </div>
        <div class="form-group">
          <label for="edit-task-description">Description</label>
          <textarea id="edit-task-description" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-task-status">Status</label>
          <select id="edit-task-status">
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
