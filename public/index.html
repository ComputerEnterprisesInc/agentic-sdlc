<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              500: '#667eea',
              600: '#764ba2',
            }
          }
        }
      }
    }
  </script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .gradient-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
  </style>
</head>
<body class="gradient-bg min-h-screen">
  <!-- Login/Register Screen -->
  <div id="auth-screen" class="screen active flex items-center justify-center min-h-screen">
    <div class="container max-w-md mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-2xl p-10 text-center">
        <h1 class="text-5xl mb-2 text-primary-500">📋 Task Manager</h1>
        <p class="text-gray-600 mb-8">Manage your tasks efficiently</p>
        
        <!-- Login Form -->
        <div id="login-form" class="auth-form active">
          <h2 class="text-2xl font-semibold mb-6 text-gray-900">Login</h2>
          <form id="loginForm">
            <div class="mb-5 text-left">
              <label for="login-email" class="block mb-2 font-medium text-gray-700">Email</label>
              <input type="email" id="login-email" required placeholder="you@example.com" 
                     class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg text-base transition-colors focus:outline-none focus:border-primary-500">
            </div>
            <div class="mb-5 text-left">
              <label for="login-password" class="block mb-2 font-medium text-gray-700">Password</label>
              <input type="password" id="login-password" required placeholder="Enter password" 
                     class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg text-base transition-colors focus:outline-none focus:border-primary-500">
            </div>
            <button type="submit" class="w-full gradient-btn text-white px-6 py-3 rounded-lg text-base font-semibold transition-all hover:-translate-y-0.5 hover:shadow-lg">
              Login
            </button>
          </form>
          <p class="mt-5 text-gray-600">
            Don't have an account? <a href="#" id="show-register" class="text-primary-500 font-semibold hover:underline">Register</a>
          </p>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="auth-form hidden">
          <h2 class="text-2xl font-semibold mb-6 text-gray-900">Register</h2>
          <form id="registerForm">
            <div class="mb-5 text-left">
              <label for="register-name" class="block mb-2 font-medium text-gray-700">Name</label>
              <input type="text" id="register-name" required placeholder="Your name" 
                     class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg text-base transition-colors focus:outline-none focus:border-primary-500">
            </div>
            <div class="mb-5 text-left">
              <label for="register-email" class="block mb-2 font-medium text-gray-700">Email</label>
              <input type="email" id="register-email" required placeholder="you@example.com" 
                     class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg text-base transition-colors focus:outline-none focus:border-primary-500">
            </div>
            <div class="mb-5 text-left">
              <label for="register-password" class="block mb-2 font-medium text-gray-700">Password</label>
              <input type="password" id="register-password" required placeholder="Min 6 characters" 
                     class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg text-base transition-colors focus:outline-none focus:border-primary-500">
            </div>
            <button type="submit" class="w-full gradient-btn text-white px-6 py-3 rounded-lg text-base font-semibold transition-all hover:-translate-y-0.5 hover:shadow-lg">
              Register
            </button>
          </form>
          <p class="mt-5 text-gray-600">
            Already have an account? <a href="#" id="show-login" class="text-primary-500 font-semibold hover:underline">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tasks Screen -->
  <div id="tasks-screen" class="screen hidden bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
      <div class="container max-w-4xl mx-auto px-5 py-5 flex flex-col sm:flex-row items-center justify-between gap-4">
        <h1 class="text-3xl font-bold text-primary-500">📋 My Tasks</h1>
        <div class="flex items-center gap-4">
          <span id="user-name" class="font-semibold text-gray-700"></span>
          <button id="logout-btn" class="px-6 py-2.5 bg-gray-200 text-gray-800 rounded-lg font-semibold transition-colors hover:bg-gray-300">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container max-w-4xl mx-auto px-5 py-8">
      <!-- Add Task Form -->
      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <h2 class="text-xl font-semibold mb-5 text-gray-900">Add New Task</h2>
        <form id="addTaskForm">
          <div class="flex flex-col sm:flex-row gap-3 mb-5">
            <div class="flex-1">
              <input type="text" id="task-title" required placeholder="Task title" 
                     class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg text-lg transition-colors focus:outline-none focus:border-primary-500">
            </div>
            <button type="submit" class="gradient-btn text-white px-6 py-2.5 rounded-lg font-semibold whitespace-nowrap transition-all hover:-translate-y-0.5 hover:shadow-lg">
              Add Task
            </button>
          </div>
          <div>
            <textarea id="task-description" placeholder="Description (optional)" rows="2" 
                      class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg resize-y transition-colors focus:outline-none focus:border-primary-500"></textarea>
          </div>
        </form>
      </div>

      <!-- Tasks List -->
      <div class="bg-white rounded-xl shadow-md p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-xl font-semibold text-gray-900">Your Tasks</h2>
          <div class="text-sm text-gray-600">
            <span id="tasks-count">0 tasks</span>
          </div>
        </div>
        <div id="tasks-list" class="flex flex-col gap-3">
          <!-- Tasks will be loaded here -->
        </div>
        <div id="empty-state" class="text-center py-10 text-gray-400 text-lg">
          <p>🎉 No tasks yet! Add your first task above.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div id="edit-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-6 border-b">
        <h2 class="text-2xl font-semibold text-gray-900">Edit Task</h2>
        <button class="close-modal text-gray-400 hover:text-gray-600 text-3xl font-light leading-none w-8 h-8">
          &times;
        </button>
      </div>
      <form id="editTaskForm" class="p-6">
        <input type="hidden" id="edit-task-id">
        <div class="mb-5">
          <label for="edit-task-title" class="block mb-2 font-medium text-gray-700">Title</label>
          <input type="text" id="edit-task-title" required 
                 class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg transition-colors focus:outline-none focus:border-primary-500">
        </div>
        <div class="mb-5">
          <label for="edit-task-description" class="block mb-2 font-medium text-gray-700">Description</label>
          <textarea id="edit-task-description" rows="4" 
                    class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg resize-y transition-colors focus:outline-none focus:border-primary-500"></textarea>
        </div>
        <div class="mb-5">
          <label for="edit-task-status" class="block mb-2 font-medium text-gray-700">Status</label>
          <select id="edit-task-status" 
                  class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg bg-white transition-colors focus:outline-none focus:border-primary-500">
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="flex gap-3 justify-end">
          <button type="button" class="close-modal px-6 py-2.5 bg-gray-200 text-gray-800 rounded-lg font-semibold transition-colors hover:bg-gray-300">
            Cancel
          </button>
          <button type="submit" class="gradient-btn text-white px-6 py-2.5 rounded-lg font-semibold transition-all hover:-translate-y-0.5 hover:shadow-lg">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden fixed bottom-8 right-8 bg-gray-800 text-white px-6 py-4 rounded-lg shadow-xl max-w-md z-50 opacity-0 translate-y-5 transition-all duration-300"></div>

  <script src="app.js"></script>
</body>
</html>
